name: Bot VAR do Lucro
# Define os horários de execução (UTC)
on:
  schedule:
    # Rodada 1: 06:00 Horário de Brasília (BRT)
    - cron: '0 9 * * *'
    
    # Rodada 2: 13:00 Horário de Brasília (BRT)
    - cron: '0 16 * * *'
    
    # Rodada 3: 23:00 Horário de Brasília (BRT) (02:00 UTC do dia seguinte)
    - cron: '0 2 * * *'
    
  # Permite rodar manualmente para testes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Baixa o código do repositório
      - uses: actions/checkout@v3
      
      # 2. Configura o Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      # 3. Instala as bibliotecas necessárias
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-genai deep-translator
        
      # 4. Executa o Bot passando os Segredos como variáveis de ambiente
  - name: Run Bot
        run: python main.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
