name: Bot VAR do Lucro

on:
  schedule:
    # Rodada 1: 06:00 BRT -> 09:00 UTC
    - cron: '0 9 * * *'
    # Rodada 2: 10:00 BRT -> 13:00 UTC
    - cron: '0 13 * * *'
    # Rodada 3: 14:00 BRT -> 17:00 UTC
    - cron: '0 17 * * *'
    # Rodada 4: 18:00 BRT -> 21:00 UTC
    - cron: '0 21 * * *'
    # Rodada 5: 22:00 BRT -> 01:00 UTC (Dia seguinte)
    - cron: '0 1 * * *'
  # Permite rodar manualmente para testes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Baixa o código do repositório
      - uses: actions/checkout@v3
      
      # 2. Configura o Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      # 3. Instala as bibliotecas necessárias
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-generativeai deep-translator
          
      # 4. Executa o Bot passando os Segredos
      - name: Run Bot
        run: python main.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
