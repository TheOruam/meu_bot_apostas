name: Bot Analista Futebol

on:
  schedule:
    - cron: '0 9 * * *'  # 06:00 BRT
    - cron: '0 15 * * *' # 12:00 BRT
    - cron: '0 21 * * *' # 18:00 BRT
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: pip install requests deep-translator google-generativeai

      - name: Rodar robô
        run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
