name: Rodar Robo de Apostas

on:
  schedule:
    # 06:00 BRT (09:00 UTC) - Pega os jogos que começam de manhã/cedo
    - cron: '0 9 * * *' 
    # 12:00 BRT (15:00 UTC) - Pega os jogos da tarde
    - cron: '0 15 * * *'
    # 18:00 BRT (21:00 UTC) - Pega os jogos da noite
    - cron: '0 21 * * *'
  workflow_dispatch: # Permite que você force a execução manualmente se quiser testar

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests deep-translator

      - name: Executar o Script Analista
        run: python main.py
