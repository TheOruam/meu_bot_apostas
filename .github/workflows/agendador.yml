name: Rodar Robo de Apostas

on:
  schedule:
    # Define o horário de execução em formato UTC (09:00 UTC equivale a 06:00 no horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite que você force a execução manualmente se quiser testar

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests deep-translator

      - name: Executar o Script Analista
        run: python main.py
